<div class="min-h-screen bg-gray-50">
  <div *ngIf="loading" class="text-center">Loading...</div>

  <div *ngIf="iframeSrc" class="mx-auto">
    <iframe
      [src]="iframeSrc"
      class="w-full h-screen border-0"
      sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
      title="AI Generated Portfolio"
    ></iframe>
  </div>

  <div *ngIf="!portfolio && !loading" class="text-center text-gray-500">
    Portfolio not found or not public.
  </div>
</div>
